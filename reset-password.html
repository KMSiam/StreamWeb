<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Reset Password | StreamWeb</title>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <a href="index.html">
                    <img src="photos/website_logo2.png" alt="Logo">
                    <span>Stream<span>Web</span></span>
                </a>
            </div>
        </div>
        <ul class="sidebar-links">
            <li><a href="index.html"><i data-lucide="home"></i> Home</a></li>
            <li><a href="contact.html"><i data-lucide="mail"></i> Contact</a></li>
        </ul>
        <div class="sidebar-auth">
            <a href="signin.html" class="sidebar-auth-btn signin-btn">Sign In</a>
        </div>
    </aside>

    <div class="main-layout">
        <header>
            <nav>
                <div class="header-left">
                    <button class="mobile-menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                    <div class="logo mobile-only">
                        <a href="index.html">
                            <img src="photos/website_logo2.png" alt="Logo">
                            <span>Stream<span>Web</span></span>
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <section class="signin-section">
                <div class="signin-form-container">
                    <div class="signin-header">
                        <h2>🔒 Reset Your Password</h2>
                        <p>Enter your new password below</p>
                    </div>
                    
                    <form class="signin-form" id="reset-password-form">
                        <div class="form-group">
                            <label for="new-password">🔑 New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="new-password" placeholder="Enter new password" required minlength="6">
                                <button type="button" class="password-toggle" aria-label="Toggle Password">
                                    <i data-lucide="eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="signin-btn">
                            🚀 Update Password
                        </button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>StreamWeb</h3>
                    <p>Securing your cinematic experience.</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 StreamWeb. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
